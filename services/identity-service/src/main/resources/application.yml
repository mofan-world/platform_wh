server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

spring:
  application:
    name: identity-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/platform_identity}
    username: ${DB_USERNAME:platform}
    password: ${DB_PASSWORD:platform}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: 3000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          batch_size: 50
          time_zone: UTC
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      password: ${REDIS_PASSWORD:}
      timeout: 2s
      lettuce:
        pool:
          max-active: 32
          max-idle: 16
          min-idle: 4
  cloud:
    nacos:
      config:
        import-check:
          enabled: false
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        namespace: ${NACOS_NAMESPACE:}
        enabled: ${NACOS_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

app:
  jwt:
    issuer: ${JWT_ISSUER:identity-service}
    secret: ${JWT_SECRET:change-this-secret-to-at-least-32-bytes}
    access-token-ttl: 30m
    refresh-token-ttl: 7d
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:8000,http://localhost:8000}
  elasticsearch:
    enabled: false
  bootstrap:
    admin-username: ${ADMIN_USERNAME:admin}
    admin-password: ${ADMIN_PASSWORD:Admin@123456}
    admin-email: ${ADMIN_EMAIL:admin@example.com}
  storage:
    root: ${ATTACHMENT_STORAGE_ROOT:./data/attachments}
    max-file-size: ${ATTACHMENT_MAX_FILE_SIZE:20MB}
    max-files-per-ticket: ${ATTACHMENT_MAX_FILES_PER_TICKET:20}
    allowed-extensions: []

logging:
  level:
    org.springframework.security: INFO
    com.alibaba.nacos: WARN

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

spring:
  application:
    name: issue-tracker
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/issue_tracker}
    username: ${DB_USERNAME:issue_tracker}
    password: ${DB_PASSWORD:issue_tracker}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:40}
      minimum-idle: ${DB_POOL_MIN_IDLE:10}
      connection-timeout: 3000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          batch_size: 50
          time_zone: UTC
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: ${ATTACHMENT_MAX_FILE_SIZE:20MB}
      max-request-size: ${ATTACHMENT_MAX_REQUEST_SIZE:100MB}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 1
      password: ${REDIS_PASSWORD:}
      timeout: 2s
      lettuce:
        pool:
          max-active: 32
          max-idle: 16
          min-idle: 4
    elasticsearch:
      repositories:
        enabled: false
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}
  cloud:
    nacos:
      config:
        import-check:
          enabled: false
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        namespace: ${NACOS_NAMESPACE:}
        enabled: ${NACOS_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

app:
  jwt:
    issuer: issue-tracker
    secret: ${JWT_SECRET:change-this-secret-to-at-least-32-bytes}
    access-token-ttl: 30m
    refresh-token-ttl: 7d
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  elasticsearch:
    enabled: ${ELASTICSEARCH_ENABLED:true}
  bootstrap:
    admin-username: ${ADMIN_USERNAME:admin}
    admin-password: ${ADMIN_PASSWORD:Admin@123456}
    admin-email: ${ADMIN_EMAIL:admin@example.com}
  upload-dir: /home/appuser/uploads/attachments
  storage:
    root: ${ATTACHMENT_STORAGE_ROOT:./data/attachments}
    max-file-size: ${ATTACHMENT_MAX_FILE_SIZE:20MB}
    max-files-per-ticket: ${ATTACHMENT_MAX_FILES_PER_TICKET:20}
    allowed-extensions:
      - doc
      - docx
      - xls
      - xlsx
      - pdf
      - png
      - jpg
      - jpeg
      - gif
      - webp
      - txt
      - csv
      - zip

logging:
  level:
    org.springframework.security: INFO
    com.alibaba.nacos: WARN


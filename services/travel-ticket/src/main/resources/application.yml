server:
  port: ${SERVER_PORT:8090}
  shutdown: graceful

spring:
  application:
    name: travel-ticket-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/platform_travel}
    username: ${DB_USERNAME:platform}
    password: ${DB_PASSWORD:platform}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:40}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: 30000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:2}
      password: ${REDIS_PASSWORD:}
      timeout: 3s
      lettuce:
        pool:
          max-active: 64
          max-idle: 16
          min-idle: 4
    elasticsearch:
      repositories:
        enabled: ${ELASTICSEARCH_ENABLED:true}
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  cache:
    type: redis
  cloud:
    nacos:
      config:
        import-check:
          enabled: false
      discovery:
        enabled: ${NACOS_ENABLED:false}
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        service: ${spring.application.name}

platform:
  security:
    jwt:
      issuer: ${JWT_ISSUER:issue-tracker}
      secret: ${JWT_SECRET:change-this-secret-to-at-least-32-bytes}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    elasticsearch:
      enabled: ${ELASTICSEARCH_ENABLED:true}

logging:
  charset:
    console: UTF-8
  level:
    root: INFO
    com.codex.travel.ticket: INFO
    org.springframework.data.elasticsearch.client.WIRE: OFF
